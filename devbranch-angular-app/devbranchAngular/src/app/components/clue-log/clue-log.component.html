<div class="clue-log-container">
  <div class="clue-log-content">
    <h3>Collected Clues</h3>
    <div *ngIf="(collectedCluesDetails$ | async)?.length === 0" class="no-clues">
      No clues collected yet.
    </div>
    <button
      *ngFor="let clue of collectedCluesDetails$ | async"
      class="clue-entry"
      type="button"
      [attr.aria-label]="'Open scene for ' + clue.label"
      (click)="openClueScene(clue)"
    >
      <h4>{{ clue.label }}</h4>
      <p>{{ clue.contents }}</p>
      <p *ngIf="clue.twist" class="twist">{{ clue.twist }}</p>
    </button>
  </div>
</div>
